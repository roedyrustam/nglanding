<section class="stats-section">
    <div class="stats-grid">
      <div class="stat-item" [appScrollReveal]="'up'">
        <div class="stat-number">10k+</div>
        <div class="stat-label">Alumni Sukses</div>
      </div>
      <div class="stat-item" [appScrollReveal]="'up'" [delay]="150">
        <div class="stat-number">200+</div>
        <div class="stat-label">Hiring Partners</div>
      </div>
      <div class="stat-item" [appScrollReveal]="'up'" [delay]="300">
        <div class="stat-number">95%</div>
        <div class="stat-label">Lulus Tepat Waktu</div>
      </div>
      <div class="stat-item" [appScrollReveal]="'up'" [delay]="450">
        <div class="stat-number">4.9/5</div>
        <div class="stat-label">Rating Kepuasan</div>
      </div>
    </div>
</section>
